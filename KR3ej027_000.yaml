body:
  text: 小兒簡要辨證小兒熱證有七面腮紅大便秘小便黃渴不止上氣急足心熱眼紅赤此皆實熱證忌用溫補小兒寒證有七面㿠白糞青白肚虛脹喜按眼珠青吐瀉無熱足脛冷睡露睛此皆虛寒忌用寒涼節錄夏禹鑄望苗竅訣舌乃心之苗紅紫心熱也腫黑心火極也淡白虛也鼻準與牙床乃脾之竅鼻紅燥脾熱也慘黃敗也牙床紅腫熱也破爛胃火也唇乃脾之竅紅紫熱也淡白虛也黑者脾將絕也口右扯肝風也左扯脾之痰也鼻孔肺之竅乾燥熱也流清涕寒也耳與齒乃腎之竅耳鳴氣不和也耳流膿腎熱也齒如黃豆腎氣絕也目乃肝之竅斜視而睛轉者風也直視而睛不轉者肝氣將絕也以目分言之又屬五臟之竅黑珠屬肝純是黃白凶證也白珠屬肺色青肝風侮肺也淡黃色腑有積滯也老黃色乃肺受濕熱也瞳仁屬腎無光彩又兼發黃腎氣虛也大角屬大腸破爛肺有風也小角屬小腸破爛心有熱也上胞屬脾腫則脾傷也下胞屬胃青色胃有風也睡而露睛者脾胃虛極也面有五位五臟各有所屬額屬心離火也左腮屬肝震木也右腮屬肺兌金也口下屬腎坎水也鼻準屬脾坤土也五臟里也六腑表也小腸心之表小便黃短澀痛心熱也清長而利心虛也胃乃脾之表唇紅而吐胃熱也唇慘白而吐胃虛也唇色平常而吐作傷胃論大腸肺之表閉結肺有火也肺無熱而便閉血枯也不可攻下脫肛肺虛膽乃肝之表口苦膽火也聞聲作驚肝虛也膀胱腎之表筋腫筋痛腎之寒氣入膀胱也面有五色紅病在心面紅者熱青病在肝面青者痛黃病在脾面黃者脾傷白病在肺面白者中寒黑病在腎面黑而無潤色者腎氣敗也望其色若異於平日而苗竅之色與面色不相符則臟腑虛實無有不驗者矣驗虎口法小兒三歲以下有病須看男左女右手叉處名虎口從第二指節側看第一節名風關第二節名氣關第三節名命關辨其紋色紫者屬熱紅者屬寒淡紅隱隱者屬虛寒青者驚搐黑者中惡白者疳病黃者脾之困若現於風關為輕氣關為重過於命關則難治矣手指脈紋形魚刺形主驚搐痰熱懸針形主傷風泄瀉積熱水形主食積客熱驚疳乙字形主肝病驚搐蟲紋形主肝蟲大腸氣積環形主疳積肚痛亂紋形主蟲珠形主無生理虎口三關三歲後以一指按三部六七至為平脈四五至為寒九十至為熱脈弦急為氣不和沉緩為傷食促結為虛驚浮為風沉細為寒脈亂者不治初生初生聲不出小兒初生或不能出聲謂之夢生多不知救深為可憐切勿剪斷臍帶速用明火將胞衣炙暖使暖氣入兒腹更以熱湯蕩洗臍帶即取貓一隻以布袋套其頭足使伶俐婦人拿住貓頭向兒耳邊以口齧貓耳貓必大叫一聲兒即醒而開聲方可燒斷臍帶又有因難產或冒風寒舉之遲緩兒氣欲絕不能啼或已僵死者切勿剪斷臍帶急用衣棉裹兒再用粗紙作捻蘸菜油點火將臍帶燒斷須燒紙捻數十根令暖氣入腹無不活者更令父母之真氣呵而接之又悶臍生者兒糞門有一膜悶住兒氣故不能出聲拍之則膜破而叫矣又有用輕巧婦人以銀簪輕輕挑破為甚便當或不能挑急以暖衣包緊勿令散放以熱水浸其胞衣寒天則以火炙之久則熱氣入腹而氣內鼓其膜自破聲自出初生無皮初生遍身無皮俱是紅肉急以早米粉干撲之候其皮全生則止或用東向陳壁土研細末摻之亦能生皮初生遍身如魚脬或似水晶破則水流又生以密陀僧研細末摻之又以蘇合丸一個煎化與乳母日服自愈初產婦勿輕服蘇合丸初生腎縮初生腎縮乃受寒所致用硫黃吳萸各三錢研極細末搗取蔥汁調藥末塗臍腹另以蛇床子燒煙燻之即伸初生無穀道無穀道者乃肺熱閉於肛門急以金銀簪或五簪看其端的刺穿之或以火針刺穿但不可深入隨以油紙捻套住免其再合初生不吮乳初生不吮乳用黑豆十九粒茅草根七節每節長寸許赤金器一件紋銀器一件用人乳一杯煎至五分服完即能食乳初生不乳初生不乳或如剪刀股裹緊吃乳不下用大獨頭蒜切薄片貼在兩腮以艾灸之如哭即好否則無救初生不尿初生不尿以蔥白一根切碎人乳半杯同煎去蔥白取乳分作四次服即尿不吮乳者服此即吮乳初生大小便不通大小便不通急令婦人以熱水漱口吸吮小兒前後心及臍下數次即通三朝浴兒取桑槐榆柳桃嫩枝各二三十段煎湯候溫浴兒可免瘡疥又可辟惡邪小兒目閉目閉或出血腫以甘草蘸豬膽汁炙之研極細末乳調服又方桑葉白菊花各一錢煎湯以青綢拭洗之小兒夜啼有脾寒者按其腹則啼止起手又啼面青手冷不吮乳用肉桂小茴各五分當歸炮姜各一錢夜啼用燈花五個研末搽乳頭上令小兒吮之即愈若無燈花以燈草燒灰略加水飛辰砂少許塗乳令吮亦妙又方用牽牛子研極細末一錢敷臍上即止又方雞糞塗兒臍上男雌女雄又方用五倍子研末口中津唾調作餅子貼肚臍以帶系之效又方蟬殼十四個去翅足用下半截焙乾入硃砂八釐共研細末蜜調塗母乳頭上令兒吮之納兒口中亦可又方治口熱而赤夜啼青黛研篩過每用二分燈芯十根煎湯調服又用其父母指甲二釐燒灰綠蔥頭二錢煎水服效導赤散治心經有熱面紅口赤一切煩啼不安及小便不通皆效生地二錢木通錢半黃芩一錢生粉草五分淡竹葉十四片燈芯十根吐乳用白蔻去殼砂仁去殼各十四粒甘草四錢生炙各半共為極細末常摻入兒口中即止舌瘡飲乳不得白礬和雞子置醋中搽兒足底自愈臍內潰爛出水赤石脂三錢煅研細末分三次搽之又方蠍子燒灰枯礬各三錢同研末每用一錢搽之月內胎驚母豬乳調水飛硃砂末再用豬乳少許抹兒口小兒瘧疾赭石二錢醋煅硃砂五分砒霜二分共為末以紙包七重打濕煨乾入麝香一分再研細麻油調塗鼻尖上及眉心四肢神驗余見後瘧疾治小兒吐瀉燒針丸黃丹水飛硃砂水飛和丸黃豆大每用三四丸插針尖上燈火燒紅存性研末用涼米泔水調服瀉者食前服吐者不拘時服外用雞蛋清調真綠豆粉作膏吐者貼兩足心瀉者貼囟門甚效余見後泄瀉調護初生未啼時挖去口中汙血以棉裹指蘸甘草湯拭淨口中涎沫然後看面色若身面俱紅口唇紫赤知其必有胎毒俟四五個時後用熟大黃一錢金銀花甘草各一錢蒸湯一杯用帛裹指蘸湯洗口並服數茶匙如此數次至次日將對周時胎糞下盡方可飲乳每日用淡鹽茶以帛蘸洗其口四五次去其苔涎可免馬牙鵝口重舌木舌之疾如初生面唇淡瑩只用銀花甘草湯洗口並服數次每日惟以淡薑湯洗一二次足矣小兒神氣未定毋犯暴寒暴風暴熱毋聽暴響毋見異物毋輕服藥凡有微疾但合乳母戒油膩葷酒能得乳汁清和一二日間自愈一歲以內只飲乳一歲以外先食米粉後食粥及爛飯勿過飽食後勿輕乳乳後勿遽食葷菜宜遲用生硬之物毋遽投臍風剪臍之法已詳達生編然或剪臍帶太短或結束不緊或浴兒牽動臍帶客風乘虛而入皆能致此其症有五兒喜啼叫者心病手足微搐者肝病唇青白縮痰涎壅塞者脾病牙關緊急者腎病啼哭不止者肺病五臟之症略見一二者猶可治全見則不能治矣臍風有內外因內因者稟受父母所致病發於六七日之間難治外因者病生於六腑發於二三四五日之間可治但看小兒不時噴嚏更多啼哭吮乳口松是臍風將發之候也急宜治之其治法及滿身燈火俱詳幼幼集成臍風症候有三一曰臍風由斷臍後為水濕風寒所乘入於臍而流於心脾令胸腹脹滿吮乳口松多啼不乳此初起之時即看小兒臍上定有隱起青筋一條自臍至腹或開兩叉上指心口若此筋已至心口則十難活二三矣須早看此筋未至心口時用香油燈草火在此青筋頭上灸三次有兩叉則向兩叉處各灸三次即時縮下寸許再從縮下筋頭上灸三次臍上灸三次筋消則病愈灸屢驗一曰噤口其症眼閉口噤啼聲漸小舌上聚肉如粟米狀吮乳不得口吐白沫小便不通遇此先看其上齶有點子或齒根邊生白點即用針挑破或以指甲刮破出膿血用薄荷煎湯磨京墨調勻以指攪過再以產母亂髮蘸墨滿口搽之另用青布蘸溫水展口即效如未愈用紫蘇前胡殭蠶各八分水煎俟溫以帛裹指蘸拭兒口並用棉蘸藥滴口中頻滴數次以開口為度口開後切勿即合飲乳並細看臍上如有青筋照前法急燒之又方用完全生蔥二根搗爛取汁用直殭蠶三個去嘴炒去絲研極細末以蔥汁調勻塗母乳頭上閤兒吮之或灌兒口內亦效又方治臍風撮口以艾葉燒灰填臍上以帛縛之若臍帶已落用蒜切薄片貼臍上以艾灰灸之候口中有艾氣立愈又方烏梅一個煎湯灌之撮口臍風面黃色氣喘聲不出唇青舌強聚口發噤用直殭蠶二枚去嘴略炒為細末蜜調納兒口中小兒十日內口噤不吮乳取大蜘蛛一個去足炙焦研末入豬乳一小杯和勻分作三次徐徐灌之神效無比又方生甘草一錢水煎濃以綿球蘸吮含出痰涎後以豬乳點入口中即瘥一曰鎖肚由肚中熱毒壅盛結於肛門大便不通急令婦人吮兒之前後心並臍下及手足心共七處凡四五次如再不通以中樣蔥白約三四寸長用麻油抹潤輕透穀道納入二寸許約片時取出另用蔥白蘸麻油納之以通為度以上治法俱就集驗簡便方錄之余詳幼幼集成小兒臍不幹棉花籽燒灰每用一錢敷之效又方龍骨煅二錢枯白礬一錢輕粉八分共研末搽數次效臍腫出汁用枯礬末或黃柏末敷之俱效小兒臍瘡馬齒莧燒研末敷之效一方用大紅洋絨燒灰為敷之效亦治臍不幹小兒臍瘡出血及膿海螵蛸去甲胭脂共為細末以油潤瘡乃搽藥效又方白石脂研末敷之愈如尚未愈再以末微炒過候冷敷之仍不可揭去前藥必愈小兒臍口腫突紅飯豆淡豆豉天南星鮮白蘞各一錢共為末用芭蕉搗自然汁加香油少許調藥敷臍上四旁得小便自下即愈小兒臍氣痛啼哭無時陳皮甘草烏藥鹽水炒生白芍小茴香鹽水炒鉤藤各三分青皮酒炒一分半水一盅煎成半盅作數次服即愈集成有全身燈火治臍風撮口等症甚好然非平日精熟者不能茲將夏禹鑄臍風燈火圖開後按穴灸之亦效臍風燈火灸穴臍輪周圍六燋若臍帶未落於帶口一燋既落於落處一燋少商大指甲內側離肉一韭葉許左右各一燋囟門一燋眉心一燋人中一燋承漿一燋共十三燋乳子未半歲服藥法凡乳子未半歲服藥須濃煎每次只能量服四五匙或七八匙半歲至周歲量每次以半杯為止其餘須令乳母忌油飯後擠去宿乳服藥一碗仰臥片時令兒吮其乳汁為要驚風闢妄陳飛霞幼幼集成一書論之甚詳而以搐字易驚字標出誤搐類搐非搐三條可使習驚風之說者廢然自返而又俾從書中所載病因證治循途守轍庶幾動無不宜投無不當俾天下幼孩無夭札之患凡業幼科者所當奉為圭臬也茲僅節錄數十條以略備不業醫者隨時採擇焉凡小兒發搐只可扶持不可把捉令其自定方免拘攣之患一曰誤搐即傷寒病痙也頸項強背反張目上視屬太陽低頭下視口噤不語手足牽引肘膝相勾屬陽明眼目或左而斜手足或左或右而搐屬少陽此是三陽表症有汗者當解肌無汗者當發散不得妄以驚風名之更不得妄投鎮墜之藥阻其經絡也桂枝葛根湯治傷風項背強身熱自汗為柔痙此邪在太陽仍兼陽明嫩桂枝一錢白芍錢半粉葛錢半老生薑炙草各一錢水煎熱服仍欲微似有汗則風邪自出汗孔自閉又桂枝防風湯見後乳子傷寒治太陽傷寒頭痛身熱身體頸項俱強無汗為剛痙原方用栝樓桂枝湯見上按此二症重者時方用人參敗毒飲代之輕者醫學心悟用加味香蘇飲代之人參敗毒散治大人小兒傷寒頭痛憎寒壯熱項強晴暗鼻塞聲重風痰咳嗽及時氣疫癘嵐瘴鬼瘧或聲如蛙鳴赤眼目瘡濕毒流注腳腫腮腫喉痹並治諸瘡斑疹及噤口痢凡病在上部宜加薄荷三四分人參茯苓枳殼桔梗前胡柴胡羌活獨活川芎各一錢甘草五分生薑二片煩熱口渴加黃芩一錢水煎熱服微汗即解治噤口痢加陳倉米二錢名倉廩散腳氣加大黃蒼朮漂各一錢膚癢加蟬蛻九個有風熱加荊芥防風亦治腸風下血本方去人參加連翹一錢銀花二錢治瘡毒加味香蘇飲治四時感冒發熱惡寒頭痛身痛鼻塞聲重惡食嘔逆咳嗽或胸膈滿悶噯氣紫蘇葉錢半香附陳皮各一錢二分炙草七分川芎五分荊芥秦艽防風蔓荊子各一錢生薑三片水煎服微敷似汗即解前症若頭腦痛甚者加羌活八分蔥白二根自汗惡風者加桂枝白芍各一錢若在春夏之交不便用桂枝即加白朮一錢五分若兼停食胸膈痞悶加山楂麥芽蘿蔔子各一錢五分若太陽本症未罷更兼口渴溺澀者此為膀胱腑症加茯苓錢半車前一錢喘嗽加桔梗前胡各錢半杏仁七枚打碎咽喉腫痛去香附生薑加桔梗蒡子各錢半薄荷五分若便秘加枳殼蘿蔔子各錢半仍用罨法蜜導法蔥豉湯治傷寒初覺頭痛身熱無汗脈洪便溏用連須蔥白十四根淡豆豉一兩水煎服如無汗加葛根三錢邪初在表宜用此散之免用麻黃湯之多所顧忌也本方去豆豉加生薑五錢名連須蔥白湯治同通關散凡一切感冒用皂角去邊弦及蟲注者二錢生半夏三錢共研細末每用少許吹鼻孔得嚏則輕無藥處單用皂角末亦可搐鼻散尤妙見下客忤治汗後不解乍靜乍躁目直視口噤往來寒熱此太陽陽明已罷尚未解傳入少陽半表半裡宜和解用小柴胡湯加防風人參七分柴胡黃芩製半夏北防風各一錢炙草五分老生薑三片大棗一枚水煎服防風當歸湯治發汗過多發熱頭面搖口噤背反張太陽兼陽明宜去風養血北防風生地各錢半當歸二錢川芎一錢水煎服附子散治陰痙手足厥冷筋脈拘急汗出不止頸項強直頭搖口噤此由汗多亡陽也青化桂川附片各七分漂白朮錢半川芎一錢獨活八分大紅棗五枚水煎冷服當歸四逆湯治小兒血虛體弱寒邪傷榮以致眼目上翻身體反張蓋太陽主筋病也當歸身嫩桂枝炒白芍以上各三錢木通炙草各一錢半北細辛一錢大紅棗五枚水煎熱服兒小者減半或乳母同服一曰類搐幼科所云驚風餘症也其實則為暑為瘧為痢為咳嗽為丹毒為瘡痘為霍亂為客忤中惡各審其症一藥可愈若藥不對症延久熱盛小兒陰血未充不時壯熱則神氣昏悶血不榮筋則手足搐掣正與內經之諸熱瞀縱皆屬於火之例相符故以諸症皆列類搐條下各依本門用方庶與誤搐非搐之寒熱虛實不相混暑證陽暑即中熱暍是也其症初起面垢身熱自汗煩躁不安唇舌皆赤氣出如火大小便赤澀口中大渴是為陽暑此症在夏秋間貧兒坐烈日中洗浴冷水多有之用白虎湯卻暑丹益元散之類白虎湯治陽暑發熱頭痛大渴大汗便秘尿赤煩躁不安熟石膏三錢知母二錢炙草一錢晚稻米一兩水煎服卻暑丹治小兒傷暑誤用風藥致心神昏悶煩躁不安甚則搐搦漂白朮白茯苓豬苓澤瀉炙草黃芩各五錢青化桂川黃連各三錢鏡辰砂二錢上為細末煉蜜為丸如芡實大每服二三丸麥冬湯下或十中取一加麥冬煎服亦可如陽暑脈虛兼吐瀉者取此方十分之二去黃連黃芩加香薷八分扁豆一錢姜一片水煎溫涼服益元散即六一散滑石三兩水飛過甘草五錢共為末每服三錢新汲水調此為治暑要藥方內加辰砂水飛二錢尤好陰暑膏粱之兒畏暑貪涼不避寒風或居深堂廣廈乍寒乍熱不謹衣被以致寒邪襲於肌表其症頭痛無汗惡寒身體拘急四肢痠痛此以夏月受寒雖名陰暑實傷於寒也治宜溫散無汗用五積散前症兼有汗口渴惡寒發熱用清暑益氣湯五積散治陰暑受寒頭痛無汗惡寒身體拘急四肢痠痛白芷廣皮川樸桔梗各七分枳殼五分川芎當歸白芍雲苓各一錢漂蒼朮製半夏嫩桂枝各八分炮姜炙草各五分生薑三片紅棗三枚水煎服清暑益氣湯治傷暑煩熱自汗口渴惡寒發熱人參六分炙黃耆漂白朮粉葛各一錢澤瀉黃柏青皮神麯煨炙草各五分五味子捶扁三分生薑二片大棗三枚水煎熱服如兼腹痛泄瀉去黃柏加炒白芍茯苓各錢半通治千金消暑丸治中暑昏悶並伏暑停食嘔吐泄瀉半夏醋炙四兩茯苓甘草各二兩研細末薑汁和丸綠豆大每五六十丸開水下如昏迷不醒即碾灌之又方去茯苓甘草加貝母四兩如前法和丸治中暑甚效小兒中暑吐瀉或卒然昏倒背陰側柏葉搗汁三匙生蜜三匙井水一杯開水一杯調灌即愈瘧疾其症初起呵欠煩悶發熱口渴面帶黃白額有汗一哭汗出其熱稍減不久復熱如故喉內痰鳴一哭即嘔嘔則痰出每日如此者即瘧病也此症為少陽為主早能和解表裡則瘧邪霍然而散多有誤認驚風輕施鎮墜阻遏榮衛邪不得出以致神情憒亂臨瘧而搐宜用清脾飲解之余詳後瘧疾清脾飲治小兒熱瘧作搐不必治搐惟治其瘧青皮陳皮柴胡漂白朮雲苓草果仁製半夏川厚朴各一錢炙甘草五分生薑三片大棗三枚水煎臨發前一時熱服三次必效又方未發前一時以蛇蛻塞鼻男左女右過時取去效余詳後簡便方痢疾其症初起兩眉經𦆂而多啼由腹痛也煩躁不安由裡急後重也數至廁而不能便或赤白相兼或單紅單白是其候也按此症雖由內傷飲食莫不由外感而發但以人參敗毒散加陳倉米三錢散之其病即減設有飲食停滯輕則消導之重則疏通之去其積垢無不愈者又單方香菌五錢紅糖白糖各二錢五分煎湯服之立愈余詳後痢疾咳嗽其症初起面赤唇紅氣粗發熱咳來痰鳴或眼胞微浮額上汗出此外有感冒寒熱傷肺急宜疏解若寒者應辛散而反涼瀉熱者應涼瀉而用浮升以致聲音不轉眼翻手搐宜用集成金粟丹惟初起疏解原未立方茲擬仍用人參敗毒散加杏仁七枚煎服二三劑人參敗毒散見誤搐餘症並詳內科咳嗽小兒咳嗽不出聲紫菀微炒研末杏仁去皮尖研如泥等分煉蜜為丸芡實大每服一丸五味子七粒煎湯化服初起勿用五味子肺實咳嗽痰喘葶藶子隔紙炒為末棗肉為丸如龍眼核大每服一丸白湯化下小兒痰壅喘咳川貝母五錢用淡薑湯潤濕飯上蒸過甘草半生半熟二錢五分其研細末砂糖為丸龍眼核大每一丸米飲化服小兒百晬嗽不止生薑自然汁一杯聽用蜂蜜四兩煉熟聽用每用薑汁一匙蜜二匙白湯調服每日五六次丹毒其症由心火熾盛熱與血搏或起於手足或發於頭面胸背遊移上下赤如丹砂形如錦紋其痛非常凡自胸腹而散於四肢者易治自四肢入而胸腹者難治法宜砭去惡血內服集成沆瀣丹方見痢疾庶不致內攻作搐倘醫者不知針砭僅妄用搽敷必致作搐而死或服連翹敗毒散方見誤搐加牛蒡亦可瓷鋒砭法見後丹毒總治十種丹毒俱見後丹毒瘡癰按瘡癤疥癬小兒獨多治宜清熱解毒宜內托解毒倘毒未先解誤用砒硫等毒藥搽之逼毒內入以致瘡忽自平其症腹脹便秘尿赤面無血色目閉不開手足搐動此毒氣內致也與外科之癰疽偶傷風濕而手足搐搦者不侔此宜速服雄黃解毒丸微下之瘡出則吉不出加喘者死方見後中惡霍亂其症先傷於食後感風寒邪正相爭心腹絞痛有上吐下瀉者其症稍輕有上不得吐下不得泄者所以煩躁悶亂俗名乾霍亂即絞腸痧其症最急速宜服鹽湯探吐之乃用藿香正氣散分理其陰陽也藿香正氣散治內傷脾胃外感風寒吐瀉霍亂等症藿香枝紫蘇葉大腹皮廣皮桔梗雲苓法半夏神麯白芷各一錢川厚朴炙甘草各五分生薑三片大棗三枚水煎服凡霍亂吐瀉腹痛忌用熱湯犯之必死須待其吐瀉後兩時入服藥過後胃氣稍復渴止知飢方可飲粥凡霍亂嘔吐不能受納藥食速以新汲水和百沸湯各一杯調勻名陰陽湯飲數口即定凡痰瘧及宿食惡毒之物阻隔中焦腹脹欲作霍亂急以鹽湯頓服探吐盡痰食即安霍亂吐瀉諸藥不效綠豆胡椒各二十一粒研細水煎一盅加新汲水一盅調服即安又方以六一散一二錢濃薑湯調服夏日更妙六一散即益元散見上傷暑乾霍亂即絞腸痧忽然心腹絞痛上不得吐下不得泄痰壅腹脹手足厥冷急以食鹽一兩生薑五錢同炒黑色水一碗煎湯溫服良久以指探喉中令吐之或不吐即瀉而愈絞腸痧亦有陰陽陰痧手足冷看其身上有紅點以燈火於紅點上淬之陽痧腹痛手足暖以針刺兩大拇指甲內側離肉一韭葉許出血即安仍先自兩臂捩下其惡血令聚指頭然後刺之甚者十指俱刺凡發痧手足冷腹痛用溫水一碗令病人伏臥凳上以手蘸水拍其兩膝彎名委中穴看其有紫黑點現以針刺出惡血即愈又法以香油拍兩手曲池穴即兩肘內彎處以苧麻蘸油戛之颳起紫疹即愈近時用光錢蘸油刮兩肘彎並背上出痧甚效一曰非搐即幼科之慢驚慢脾風即幼科之慢驚慢脾風其詞自相矛盾其方治無一效故集成以非搐辨之引夏禹鑄之言曰世人均稱慢驚予獨曰慢證蓋此證多成於大病之後庸工一見病愈遂不防守去路或初誤汗誤下吐瀉久而脾胃虛極故成慢證慢證何驚之有彼庸醫見兒眼翻手搐握拳形狀似驚故以驚名之一作驚治或推拿或火是猶兒已落井而又下石也急以六君子湯加桂附及理中湯加附子等藥稍可救之凡四肢厥冷宜用蔥姜同搗炒溫熨其胸腹或以硫黃五分胡椒一分薑汁調敷臍上膏藥蓋之市上所賣治急慢驚風丸藥乃抱龍丸牛黃丸之類急驚服之有效若遇慢驚則速其死六君子湯治小兒吐瀉之後脾胃大傷或大病之後不思乳食一切久病中氣虛寒及成慢證者並皆治之官揀參一錢漂白朮二錢白雲苓錢半法半夏陳皮各五分炙甘草一錢煨姜三片大棗三枚早米一撮水煎溫服四肢厥冷加炮姜四分甚者加附子五分頭搖者加天麻八分手足搐搦加青化桂去粗七分鉤藤一錢又方治虛搐桂圓整個燒存性研二錢炮姜四分紅棗三個煎湯調服理中湯治脾胃虛寒面青腹痛寒嘔寒瀉及幼科慢驚等症人參二錢漂白朮三錢炮姜炙草各一錢水煎溫涼徐徐服若四肢厥冷加附子一錢肉桂去粗五分如寒瀉不止加肉豆蔻去油四分丁香研四分急慢驚風症治辨誤傳驚風各症集成辨之甚詳然恐習俗相沿驟不能辨故另採數條於後莊氏福幼編曰急驚屬實熱清熱即所以治急驚慢驚屬虛寒溫補即所以治慢驚二症有寒熱之殊用藥有云泥之別景岳全書曰急驚之候壯熱痰壅搐搦反張牙關緊急口中氣熱頰赤唇紅飲冷便結小便赤脈浮洪數慢驚之候多由吐瀉氣微神緩昏睡露睛痰鳴氣促驚跳搐搦或乍發乍靜身涼身熱或肢體逆冷或口唇青赤面色淡白脈遲緩或見細數急驚風此乃痰火閉症初起用通關散開肺竅見上頁再服勾藤三錢連翹木通山梔黃芩枳殼車前栝蔞霜各一錢額赤唇紅口中氣熱牙關緊急痰涎壅塞咽喉其響如潮名曰涎潮用金星礞石火煅研細入生薄荷汁內加白蜜調和溫水沖服其藥自裹痰從大便出屢驗又方燈芯二十根每根約五寸蟬蛻去頭足並蓋只用肚皮十四個明辰砂末三錢以新白紗紮緊用綠線系物墜於沙罐兩邊懸空放水中量兒大小或水盅半煎至一盅或水一盅煎至七分服下即效有辰砂須略澄清不可服渣又方用螞蚱焙為末每四五分薑湯送下立愈又方荊芥柴胡各一錢竹瀝半盅入薑汁二匙水一匙煎服治驚搐發熱有痰甚效又方大梔子一枚研末雞蛋一個去黃用白和前藥調勻搽兒腹四圍寸金丹治急驚甚效方見內科脾胃抱龍丸治急驚亦效急驚慢驚外治三方芙蓉花葉取嫩的約五六塊男雙女單將其葉碎煎雞蛋角三隻敷小兒肚臍中冷又換之三四次愈又方殭蠶九條全蠍九隻梅冰片三分麝香分半三仙丹三分共為細末用蜜糖搗成餅貼臍上另用隨便膏藥蓋之每小兒一歲用藥三分之一兩歲用藥三分之二三歲照方全用俟小兒有啼聲即宜以乳哺之或以薄粥食之不可不慎調理也又方將白頸曲鱔刀劖二段跳急者急驚用跳慢者慢驚用加麝香一分搗爛對臍貼外用膏藥蓋緊莊在田福幼編治慢驚風神效二方慢驚之症系小兒吐瀉得之為最多或久瘧久痢或痘後疹後或風寒飲食積滯過用攻伐傷脾或秉賦本虛或誤服寒涼或因急驚而用藥攻降太甚或失於調理皆可致此症也其症神昏氣喘或大熱不退眼開驚搐或乍寒乍熱或三陽晦暗或面色淡白青黃或大小便青白或口雖開裂出血而口中氣冷或瀉利冷汗或完穀不化或四肢冰冷並至腹痛氣響喉內痰鳴角弓反張目光昏暗此虛症也若再用寒涼再行消導或用膽星抱龍以除痰或用天麻全蠍以驅風或用知柏芩連以清火或用巴豆大黃以去積殺人如反掌實可畏也欲治風而無風可治欲治驚而無驚可治此實因脾腎虛寒孤陽外越無氣無根陰寒至極風之所由動也治宜先用辛熱再加溫補蓋補土即所以敵木治本即可以治標也凡小兒一經吐瀉交作即是最危之症若其屢作不止無論痘後疹後不拘何因皆當先用參朮以救胃氣薑桂熟地等藥以救腎氣不惟傷食後當急救之即傷寒傷暑亦當急救之蓋其先雖有寒暑實邪一經吐瀉業已全除脾胃空虛倉廩空乏若不急救恐虛痰上湧命在傾刻矣庸醫見之皆誤指為熱為食投以清火去積涼藥立時告變為之奈何如其失之寒涼斷難生活不若失之溫補猶可救療此語發明吐瀉驚風之理極為透徹後之君子願無忽諸今將慢驚辨症羅列於後慢驚吐瀉脾胃虛寒也身冷陽氣抑遏不出也服涼藥之後往往致此鼻孔煽動真陰失守虛火燥肺也面色青黃及白氣血兩虛也口鼻中氣冷中塞也大小便青白腎與太陽全無火也昏睡露睛神氣不足也手足搐掣血不行於四肢也角弓反張血虛筋急也乍熱乍涼陰血虛少陰陽雜錯也汗出如洗陽虛而表不固也囟門下陷虛至極也身雖發熱口唇焦裂出血卻不喜冷茶水進以寒涼愈增危篤以及所吐之乳所瀉之物皆不甚消化脾胃無火可知唇之焦黑乃真陰之不足也以上慢驚各條須審察有數條相合即放心照後二方治之勿疑逐寒蕩驚湯藥性溫暖專治小兒氣體本虛或久病不愈或痘後疹後誤藥泄瀉嘔吐轉為慢驚若清熱散風愈治愈危速宜服此能開寒痰寬胸膈止嘔吐蕩驚邪所謂回元氣於無何有之鄉一二劑後嘔吐漸止即其驗也認明但系虛寒即宜服之不必疑慮胡椒炮姜各一錢肉桂有油便佳去粗一錢丁香十粒共研為細末以灶心土三兩煮水澄清煎藥大半盅頻頻灌之接服後方定獲奇效也加味理中地黃湯助氣補血卻病回陽專治小兒精神已虧氣血大壞形狀狼狽瘦弱至極皆可挽回如法濃煎頻頻服之參天救本之功有難以盡述者熟地五錢當歸枸杞黨參棗仁炙耆故紙各二錢白朮三錢萸肉炮姜肉桂炙草各一錢加生薑三片紅棗肉三枚好胡桃二個打碎為引仍用灶心土二兩煎水澄清煎藥取濃汁一茶杯加附子五分煮水摻入量兒大小分數次灌之如咳嗽不止加粟殼金櫻子各一錢如大熱不退加白芍一錢泄瀉不止加丁香六分只服一劑即去附子只用丁香七粒隔二三日又用附子二三分因附子性大熱中病即宜去之如用附子大多則小便閉塞不出如不用附子則沉塞臟腑固結不開如不用丁香則泄瀉不止若小兒虛寒至極附子亦不妨用至三錢此方救陰固本治小兒慢驚稱為神劑若小兒吐瀉不至已甚或微見驚搐胃中尚可受藥吃乳便利者亦不必服逐寒蕩驚湯只服此藥一劑而風定神清矣若小兒尚未成驚不過昏睡發熱不退或時熱時止或日間安靜夜間發熱以及午後發熱等症總屬陰虛均宜服之若新病壯實之小兒眼紅口渴者乃實火之症方可暫行清解但果系實火必大便閉結氣壯聲洪且喜多飲冷茶水若吐瀉交作則非實火可知矣附錄慢驚單方肢體逆冷痰滯咽喉如牽鋸狀唇緩面青口鼻氣微昏睡露睛速用胡椒七粒生梔子七個蔥白七枚灰面一撮雞蛋白半個先將前四味研末雞蛋白調勻攤青布上貼小兒心窩一日夜除去有青色即愈矣如未愈再貼一個此方貼後仍當補脾輕者四君子湯薑棗煎重者用理中地黃湯見上頁客忤小兒客忤由真元不足神氣未充故外邪客氣得以乘之或生人遠來或六畜暴至或五氣入鼻藏於心肺正氣受忤此外因之客忤也其症口吐青黃白沫面色變易喘急腹疼反側不安手足搐搦第此症神不昏亂為異耳治宜塗囟法搐鼻法內服攝生散塗囟法專治客忤等症灶心土一錢明雄黃五分真麝香五釐共研細末棗肉和勻捏作餅子照囟門寬窄為樣以餅貼囟門取艾絨作豆大一粒灸三炷即止又方灶心黃土蚯蚓糞各等分研細末水調塗兒囟上及五心良搐鼻散治傷風傷寒頭目不清並治客忤川芎藿香葉牙皂各二錢白芷細卒辰砂各錢四分共研極細末以少許大吹得嚏則邪氣出矣攝生散治一切卒中大小科同制南星南木香法半夏各一錢北細辛漂蒼朮石菖蒲炙甘草各一錢生薑三片水煎熱服中惡較客忤更甚如老柩腐屍淫祠古樹冷廟枯井敗屋陰溝皆有惡毒之氣小兒觸之從鼻孔入肺閉其清道窒塞胸中忽然而倒四肢厥冷兩手握卷上氣喘急者是也復有中惡毒之物者如菌蕈河豚瘟牛疫馬自死六畜並水雞蝦蚌等類自口而入則腸胃受之故心腹刺痛腹皮青黑前後二症俱宜搐鼻散搐鼻令其噴嚏毒氣散出然後用藥返魂湯治前症中惡氣死者麻黃去節二錢杏仁去皮七個炙草一錢蔥白三寸水一盅煎至半盅分數次服解毒雄黃丸治後症中毒物死者明雄黃巴豆霜各一錢川鬱金二錢研末醋和米汁打糊為丸綠豆大每用三五丸白湯下以利為度小兒卒然暴死不解何病以搐鼻散吹之如無藥以狗糞一丸紋汁灌之大驚卒恐幼科以此為急驚其實小兒氣血未充所以一受大驚卒恐神氣失散憒亂不堪又何實邪之有收復正氣猶恐不及安可以急驚而用清散耶即如硃砂琥珀之類不過取其鎮墜亦非救本之法夫急驚由於風熱慢驚由於脾腎之虛而此以大驚受困者本於心膽受傷神氣陡離之病當以收復神氣為主宜秘旨安神丸團參散獨參湯之類加金銀物煎服秘旨安神丸原治心血虛而睡中驚惕並治大驚卒恐又治大病後夜啼人參棗仁炒茯神法半夏各一錢大當歸白芍橘紅各七分北五味七粒捶扁炙甘草五分共為細末煉蜜為丸如芡實大每服一丸生薑湯下團參散治心虛血熱自汗盜汗之類並治大驚卒恐人參當歸等分共為細末用雄豬心一個切作三片每以藥末二錢用豬心一片煎湯服加桂圓三個亦佳小兒時疫疫癘流行之時小兒作熱是即時疫乍有眼目上竄角弓反張手足搐掣不可誤認驚風但以時疫治之自愈太極丸治時疫天竺黃膽星各五錢酒大黃二錢直殭蠶三錢麝香冰片各二分共為細末端節午時修蜜丸如芡實大凡遇疫症薑湯服一丸神效或用搐鼻散吹之方見上頁內服人參敗毒散亦效方見誤搐癇證多由於初病時誤作驚治輕施鎮墜蔽固其邪留連於膈膜之間所以一遇風寒冷飲引動其痰卒然而倒四肢強直目閉或眼珠翻上不轉或口噤或咬舌口中涎出或無涎其面色或青或白或作六畜聲其狀不一乃小兒之惡症也昏暈一時即醒如常其發或以旬計或以月計或以歲計皆因中氣素弱脾虛主痰宜先服消風丸再用集成定癇丸見下消風丸非治癇之藥用以疏散外感開通經絡庶後藥得效耳薄荷羌活獨活防風天麻荊芥穗川芎細辛各一錢膽南星二錢共為細末煉蜜為丸一錢一顆每日一丸薄荷蘇葉煎湯化服服完七丸再服後藥集成定癇丸人參一兩無力者倍用黨參漂白朮土炒一兩五錢雲苓廣皮酒炒法半夏當歸酒洗白芍酒炒白蔻仁酒炒漂蒼朮黑芝麻拌炒以上各一兩真龍齒一兩火煅醋淬研末水飛曬乾只取五錢赤金箔三十張鏡辰砂三錢水飛聽用上藥制過焙乾研極細末篩過煉蜜為丸龍眼核大以硃砂為衣貼以金箔曬乾用瓷瓶收貯每日早中晚各服一丸薑湯化下癇症未久者服此若年深月久者午晚服此丸早間須服河車八味丸方見幼幼集成傷寒幼科謂八歲以前無傷寒此無稽之談也但乳子與小兒異治乳子筋骨柔脆不耐傷寒初入太陽即人事昏沉渾身壯熱筋脈牽強醫者不詳辨誤認為驚風其禍立至初起不宜發表恐汗多亡陽急宜解肌使表邪從外而出斯無變痙之虞桂枝防風湯治半周一歲以至三五歲幼兒傷寒初起發熱體重面黃或白喘急口中氣熱呵欠頓悶速以此方解散肌膚之邪有汗能止無汗能發為幼科解表之第一方嫩桂枝北防風各錢半白芍二錢老生薑炙草各一錢大紅棗五枚水煎熱服有痰加白芥子一錢有嘔吐加陳皮製半夏各一錢熱重加柴胡一錢胸緊氣急加枳殼一錢小柴胡湯治裡熱惡熱出頭露面揚手擲足口氣熱臭煩渴自汗柴胡錢半人參七分黃芩法夏各一錢炙草五分加石膏知母若前裡熱症兼有掀衣氣粗小便赤短大便燥結者用小柴胡湯去半夏加莊黃一錢薑棗煎服若夾食傷寒壯熱頭痛噯氣腹脹大便酸臭用柴胡錢半製半夏赤芍莊黃各一錢小枳實八分姜三片棗一枚同煎陰症裡虛頭額冷手足冷口中氣冷面色暗淡大便瀉用理中湯方見非搐若泄出青黃方內加黃耆炒錢半酒芍一錢寒甚者再加好肉桂一錢附子七分水煎溫服惺惺散治小兒真元不足氣血怯弱內傷外熱不能受表人參茯苓白芍炒桔梗花粉酒炒川芎北防風各一錢北細辛五分白朮錢半生薑三片紅棗三枚水煎熱服小兒傷寒類治與大方科同詳見集成治四時感冒傷風咳嗽用人參敗毒散凡咳嗽痰不應者每日二服以痰豁為度人參敗毒散方見誤搐並治傷寒初起發熱頭痛等症傷暑見類搐暑症傷濕有出於天氣者雨露是也出於地氣者泥水是也由飲食者酒漿生冷是也由人事者汗衣臥濕如小兒澡浴便溺衣褓不幹是也然所因雖異總由脾氣之虛治法有二一曰濕熱一曰寒濕盡之矣病而發熱者為濕熱宜清宜利病而多寒者為寒濕宜燥宜溫柴苓湯治發熱身重多煩渴小便赤澀大便秘結脈見洪滑是濕熱柴胡錢半人參黃芩製半夏漂白朮豬苓澤瀉茯苓各一錢青化桂炙草各五分生薑三片大棗三枚水煎熱服若大小便秘兼用外治法見後二便不通茵陳五苓飲治中濕發黃作熱小便赤澀茵陳二錢漂白朮一錢赤苓錢半豬苓澤瀉各一錢青化桂甘草各五分生薑三片大棗三枚水煎服以上皆治濕熱胃苓湯治寒濕頭重體重往來寒熱脹滿泄瀉並可和水土調脾胃漂蒼朮厚朴姜炒廣皮白朮土炒雲苓豬苓澤瀉各一錢青化桂炙草各五分生薑三片水煎食前服如兼吐嘔加藿香砂仁各八分五皮飲此方合胃苓湯專治中濕浮腫神效生薑皮大腹皮茯苓皮桑白皮五加皮各二錢燈芯十根大棗三枚水煎空心服若合胃苓湯服數劑不效必用溫補如理中湯八味丸宜擇用之八味丸熟地八兩山藥炒雲苓各四兩山茱丹皮酒炒澤瀉各二兩附子熟兩半肉桂去粗一兩煉蜜為丸如梧子大每服三錢開水下理中湯見上非搐小兒浮腫老絲瓜四五兩蔥白四兩燈草三兩煎湯浴之並飲一二小杯余見後腫滿小兒哮喘簡便方並詳內科治痰氣壅塞哮喘好雪梨汁一杯生薑汁半杯蜂蜜半杯薄荷細末一兩和勻器盛用重湯煮一時之久在意與食痰如奔馬又方絲瓜燒存性研末棗肉為丸如彈子大薑湯化下化氣最捷並能止嗽治醋食成吼甘草二兩去皮每段切二寸長兩半劈開豬膽三枚取汁浸甘草三日收起火上炙乾為末蜜丸綠豆大每晚臨臥服二錢以茶湯送下神效治一切吼疾或痰或食遇厚味即發者尤效蘿蔔籽蒸熟曬乾為末豬牙皂角燒存性等分共研細末薑汁打糊為丸綠豆大每服二十丸薑湯下諸疳症十六歲以前為疳十六歲以後為癆皆乳子真元虛弱飲食太早或肥甘肆進飲食過飧積久成疳或乳母寒熱不調及喜怒房勞之後乳哺而成復有取積太過耗損胃氣或大病之後吐瀉瘧痢飲食減少以致脾胃失養二者雖所因不同皆歸於虛也其症頭皮光急毛髮焦稀腮縮鼻乾口巉唇白兩眼昏爛揉眉擦鼻脊聳體黃闔牙咬甲焦渴自汗溺白瀉酸肚痛腸鳴癖結潮熱酷嗜瓜果咸炭水泥者皆其候也初病以集聖丸為主其有五臟兼證從權加減久病用肥兒丸調之以補為消可也俱載幼幼集成疳症簡便方小兒疳積肚大黃瘦骨立頭上瘡痂發如麥穗乾蟾蜍五隻去四足以香油塗之炙焦為末蒸黑棗去核取肉搗膏和蟾蜍末為丸如龍眼核大每用一丸日三服積垢自下多服之形容自變其病如失月蟾丸治五疳八積腹大黃瘦骨立頭生瘡發拳結等症大蝦蟆一個放瓶中綿紙封口七日後取糞中蛆洗淨不拘多少入瓶中俟蟆食完取蟆去頭爪與腸肝以麻油塗蟆身瓦上焙枯為末米湯調服或用蜜為丸連服五六個一月內形容頓改病除體壯兼治小兒癬瘡口耳瘡久不愈者謂之月蝕以此藥末調香油塗之又方蝦蟆一隻去頭及皮足腸等用酒洗淨紅糖拌砂仁末填入腹中縫定濕紙包裹煨熟食之立效又方穀精草或加小青草為末每用二錢雞軟肝一具用酒漿飯上燉熟去藥取肝日日常服即目盲垂危者可愈紅燕丹專治小兒疳積骨瘦如柴目閉溺赤腹中疼痛或尿如米泔神效大石燕二個一雌一雄重一兩者更佳入傾銀鍋內上下用炭火煅紅焠入好米醋中如此者九次加明亮硃砂另研三錢水飛淨紅曲一兩揀淨三味共研極細末周歲者每服三分糖拌不拘時服按此方消疳化積且無藥氣並可和於糖果粥飯中服之其效如神不可輕視小兒冷疳吐食腹大面黃腿縮母丁香七枚為末人乳和蒸三次薑湯調作數次服小兒諸疳日久身面生瘡爛成孔如大人楊梅瘡樣用蒸米飯時甑蓋四邊滴下氣水以碗承水掃瘡上數日即效百藥不驗者此方如神疳蝕口鼻用糞蛆洗漂極淨曬乾微炒為末三錢毛褐衣燒灰錢半共研勻頻吹於口內效又方治牙疳鼻疳人中白煅錢半毛褐灰枯礬各一錢為細末濕者乾摻乾者香油潤濕再搽口疳破爛人中白煅過厚黃柏蜜炙焦等分少加冰片共研末以鹽茶洗口後以藥末搽之走馬牙疳及齒齦腐爛黑臭者用溺壺內多年積垢煅紅一兩兒茶五錢黃柏薄荷青黛各一錢冰片三分共研細末以溫水先嗽口然後吹藥於疳上每日六七次吹藥時涎從外流者吉涎收口內者毒入里不治治疳蝕爛口鼻欲死海中紫貝子俗名砑螺炭火煅過為末臘豬油調搽治牙疳潰爛穿唇破舌並治口瘡川黃連五分膽礬兒茶各錢半共為細末搽之治一切疳瘡以乾蟾蜍燒灰三錢黃連二錢青黛一錢麝香五釐共為末先以甘草湯洗後塗之妙疳痢眼胞腫腹脹痢色無常新羊屎一升水一升浸一夜次早絞汁頓服日午乃食極危者三服即愈嘔吐有聲有物為嘔有物無聲為吐其證有寒有熱有傷食然寒熱皆因於傷食總屬胃經復有溢乳哯乳嘔噦皆與嘔吐相似而不可以嘔吐治之更有寒熱拒隔之證又有蟲痛而吐者症治俱詳載幼幼集成凡治小兒嘔吐宜減少其乳食凡嘔吐多渴不可與之茶水水入復吐必須忍渴一二時而後以米湯與之吐自止矣小兒嘔吐簡便方寒吐者乳片不消多吐而少出面白眼慢不熱不渴氣緩神昏額上汗出脈息沉微輕者藿香正氣散不止用理中湯加藿香再不止用理中湯加公豬膽汁和童便少許自止單方生薑一大塊直切薄片勿令斷層層搽鹽以苧麻紮緊外用草紙七層包之水濕慢火煨令熟取起去麻紙將姜搗爛和早米煎湯服之立止甚效小兒胃熱嘔吐外症面赤煩躁身熱作渴手足心熱黃連一錢薑汁炒熟石膏一錢共為細末每服一錢白湯調下吐止勿再服又方枇杷葉用蜜塗炙之刷盡毛每用葉十片煎湯熱服立止又方滑石水飛六錢甘草一錢共研細末每用一二錢淡薑湯調服傷食嘔吐眼胞浮腫面色微黃足冷其熱日輕夜重或吐酸或吐黃水或吐青痰此有宿食也砂仁法半夏藿香各錢半公丁香枳殼木香厚朴薑汁炒各一錢共為細末用炒神麯研細四錢打糊為丸如龍眼大每服一丸薑棗煎湯化下如傷肉食者加楂肉八分同煎如傷麵食者加炒麥芽八分同煎凡小兒服藥不納者內有蛔蟲在膈間但於嘔吐藥中加川椒十四粒則不吐矣小兒乾嘔惡極之證甘蔗取汁聽用生薑取汁聽用臨服用蔗汁六匙薑汁一匙和勻隔水略燉溫服之不用湯調傷乳吐才乳即吐是為溢乳宜節其乳則吐自止或俟乳消以煨姜二片紅棗二枚煎湯服數匙亦佳哯乳吐時時吐乳而不多似吐非吐胃虛故也六君子湯加藿香砂仁各六分煨姜三片紅棗二枚煎湯一盅徐服或單用煨薑紅棗煎湯服之亦可泄瀉神朮散燥濕理脾為泄瀉之良藥兼治嘔吐蒼朮陳土炒錢半陳皮一錢厚朴薑汁炒炙甘草藿香各八分砂仁四分姜一片水煎服濕瀉腸鳴腹不痛身體重瀉如醬色是濕氣宜燥滲用神朮散加連翹茯苓各一錢藿亂症瀉水或兼風水穀混雜是濕兼寒風神朮散加木香炮姜各五分防風一錢升麻六分柴胡六分食積瀉腹痛甚而瀉瀉後痛減瀉出酸氣是食積神朮散加楂肉炒麥芽煨神麯各一錢二分痰瀉時瀉時止或多或少是痰積神朮散加茯苓製半夏各二錢熱瀉腹痛腸鳴瀉水痛一陣瀉一陣小便赤大便老黃色是實熱宜清解神朮散加連翹梔仁澤瀉各一錢虛熱瀉前症瀉出淡黃色是虛熱神朮散加漂白朮茯苓炒白芍各錢半粉葛一錢熱瀉暴注下迫謂其出物而迅疾也便黃溺赤口氣蒸煩渴少食宜五苓飲豬苓錢半茯苓澤瀉各一錢白朮錢半青化桂去粗六分加梔仁藿香各一錢虛瀉脾土虛寒作瀉所下白色或穀食不化或水液澄清其候神思疲倦唇口舌俱白色宜用理中湯或六君子湯方俱見前非搐風瀉色青稠黏宜用六君子湯方見前加柴胡八分白芍炒錢半凡大瀉煩躁大渴其病不論新久皆用七味白朮散生其津液痢疾作瀉亦然此治小兒泄瀉之聖藥人參漂白朮雲苓藿香葉粉葛各一錢木香三分炙草五分水煎當茶頻飲不可別用湯水泄瀉簡便方治水泄或飲食過度或飲冷水冒暑而發生薑搗爛三錢陳細茶三錢濃煎湯飲立止水瀉不止蔥姜搗爛入黃丹為丸如芡實大每用一丸填臍內以膏藥蓋之即止泄瀉因傷濕而起米穀不化不思飲食困弱無力用土炒白朮白茯苓各三錢水煎服食前飯後腹痛者加白芍一錢炙草五分泄瀉因於寒者腹痛手足冷胡椒十四粒生薑三錢淡豆豉二錢煎湯熱服泄瀉腹痛奇方用雞蛋一枚將小頭打一小孔入胡椒七粒於內以紙封頂濕紙包煨熟酒送更效胡椒不吞亦可小兒溏泄柿餅燒熟食之即止脾虛久瀉白朮土炒山藥酒炒蓮肉去心蒸熟砂仁酒炒各一兩共為細末以白砂糖二兩和勻每服一二錢米飲調下又方早米造飯鍋巴取四兩研末蓮子去心蒸曬為末四兩白糖四兩共和勻每服二三錢白湯調日三服治泄瀉並治久瀉如神車前子以青鹽水炒秤過二兩白茯苓炒二兩山藥炒二兩炙草六錢共為細末每服二三錢炒米湯調下烏梅一個煎湯調更好真神方也若系久瀉脾虛者須加白朮土炒二兩方效治脾胃虛弱吐瀉之後大病之後用六君子湯去半夏薑棗煎服數劑以調理脾胃傷食有寒有熱有虛有實有初病有久病症治俱詳集成茲只錄簡便數條治傷冷食及難化之物用生薑切片四兩紫蘇四兩煎濃湯置浴盆令患者乘熱坐湯以手揉其胸腹以熱湯淋之氣通即化又方以生薑搗爛紫蘇葉搗爛各四兩炒熱分作兩布包輪流熨胸腹如冷再炒再熨神效治傷食停積不消用白酒麴即釀酒小曲炒二兩老麥芽取淨末一兩共為細末每服二錢白湯調下治果及糯米傷尤效又方治脾虛停食炒白朮二兩枳實煨一兩研末神麯五錢打糊為丸每服三錢米飲下治飲食停滯飽悶不消糯米一升炒熟分作二布包於臍腹輪熨之助其脾氣轉運立消凡食肉停滯不消山楂子三十粒捶碎煎濃湯飲之自化食犬肉成積不治則殺人山楂肉二十四粒捶碎杏仁去皮尖二十四粒打碎濃煎湯飲數服自化食牛肉腹脹不消干稻草一把煎濃湯滾熱飲之自消麵食腹脹生薑搗汁沖好酒熱服即消生蘿蔔取汁溫熱服神效用蘿蔔子亦可凡食麵用醋多不作脹食菱角腹痛作脹生薑搗自然汁以滾湯沖服立消食瓜果生冷太多以致腹脹氣急青化桂去粗皮研細末以飯搗和丸綠豆大每服五丸稍長者十丸水送下病愈藥停凡小兒病醫症不確錯用反藥或煩躁或嘔瀉欲解其藥用黑豆一杯甘草三錢濃煎服之效小兒發熱醫方論治大緊茲分四大證一曰表熱一曰裡熱一曰虛熱一曰實熱證治俱詳幼幼集成小兒表熱者發熱時喜人懷抱畏縮惡風寒不欲露出頭面面帶慘色口不渴清便自調吮乳口不熱或鼻塞流涕或噴嚏初起一汗可解用加味香蘇飲見誤搐元氣怯弱者加人參白朮或用蔥豉湯熱服取汗亦可重者用人參敗毒散方俱見上誤搐風寒發熱兼吐瀉者系脾胃虛怯不用發散用五苓飲煎送理中丸見非搐裡熱者發熱時喜露頭面仰身臥揚手擲足揭去衣被渴欲飲水吮乳不休者口渴也吮乳口熱小便赤大便閉宜解利之用導赤散見初生啼器加黑梔仁當歸川芎防風各七分大便秘者加莊黃七分並用罨臍法或蜜煎導法以通之若每日巳午時發熱過夜則退去此心經血熱也輕則用導赤散方見初生重則用四順清涼散方見下頁不必加藥虛熱者多從大瀉之後或溫熱或潮熱如潮汐有期或渴或不渴神氣困倦四肢少力大小便如常宜補之四君子湯方見上非搐加炮姜五分紅棗肉三枚以灶心土三兩化水澄清煎服有潮熱者再加酒芍二兩柴胡淡竹葉各六分夜間作熱旦則退去是血虛也六味地黃湯見下龜胸加炙龜版當歸白芍又傷寒無汗發汗熱不退下之熱仍不退乃表裡俱虛宜四君子湯見非搐加山藥炒扁豆浸去殼炒各二錢實熱者面赤腮燥鼻孔干喜就冷或合面臥或仰面臥露出手足揭去衣被大渴不休大小便閉宜微下之用集成沆瀣丹方見後痢疾或用四順清涼散杭白芍二錢當歸莊黃各一錢炙甘草五分加連翹黃芩川芎各八分枳殼荷葉各四分檳榔五分燈草十莖水煎服如大便仍秘再用罨臍蜜導等法通之其傷於熱暍暑濕疳積等症發熱者散見各門並詳幼幼集成可參考焉神授外治法疏表法小兒發熱喜人懷抱面帶慘色口不渴清便自調吮乳不熱或鼻塞流涕或噴嚏渾身拘急此表熱也以蔥一握搗爛取汁少加麻油和勻於避風處指蘸蔥油摩運兒之五心頭面頂背諸處每處摩擦十數下運完以厚衣裹之蒙其頭略疏微汗使邪氣外出即愈不可令其大汗清裡法小兒發熱至二三日邪已入里或乳食停滯內成鬱熱其症五心煩熱喜露頭面口渴多啼胸滿氣急面赤唇焦大小便秘此裡熱也雞蛋一枚去黃取清以碗盛之入麻油約與雞蛋清等再加雄黃細末一錢攪極勻以婦女亂髮一團蘸蛋清於小兒胸口拍之寒天以火烘之不可冷用自胸口拍至臍輪只須拍半個時候仍以頭髮敷於胸口以布扎之一炷香久取下不拘一切諸熱皆能退去此身有熱者用之若身無熱惟啼哭焦煩神志不安不必蛋清專以麻油雄黃拍之乃治危險之症功難殫述解煩法凡小兒實熱之症及痘疹毒盛熱極其候面赤口渴五心煩熱啼哭焦擾身熱如火上氣喘急揚手擲足一時藥不能及水粉一兩以雞蛋清調勻略稀塗兒胸口及兩手掌心復以釀酒小曲十數枚研爛熱酒和作二餅貼兩足心布扎之少頃其熱散於四肢心內清涼不復啼擾開閉法小兒風痰閉塞昏沉不醒藥不能入甚至用艾火灸之亦不知痛生薑一大塊生菖蒲生艾葉生蔥各一把共入石臼內搗如泥以麻油好醋各一杯同前四味炒熱布包之從頭頂背胸四肢乘熱往下熨之其痰豁然而醒引痰法凡小兒痰嗽上氣喘急有升無降喉中作牽鋸之聲須引而下行生白礬研末一兩麵粉三錢好醋調和作二小餅貼兩足心布包之一宿其痰自下暖痰法凡小兒胸中有寒痰不時昏絕醒即吐出如綠豆粉濃厚而帶青色此寒極之痰前法皆不能化惟用生附子一枚生薑一兩同搗爛炒熱布包熨背心及胸前熨完將姜附捻成一餅炙溫熱貼於胃口良久其痰自開納氣法凡小兒虛脫大症上氣喘急真氣浮散不得歸元吳茱萸五分胡椒七粒五倍子一錢研細末酒和作餅封肚臍以帶扎之氣自順通脈法凡小兒忽爾手足厥冷用生薑煨熟搗汁半杯略入麻油調勻以指蘸姜油摩兒手足往下搓挪揉捩以通其經絡俟其熱回以手拭去之小兒指紋帶澀推之不動急以此法推豁之不論陰陽虛實用之皆效定痛法凡小兒胸中飽悶臍腹疼痛一時無藥用食鹽一碗炒極熱向胸腹從上熨下冷則又炒又熨痛定乃止調治法凡小兒有病令其本身忌口乳子即令乳母忌口嚴戒葷酒油膩酸鹼辛辣之物及寒暑惱怒房勞俱宜慎之若病輕者得飲清乳一二日不藥亦愈凡乳子穀食不宜太早至於油膩腥膻酒食凝滯難消之物平日俱宜戒食病中尤當切忌慎之慎之痢疾症治見前類搐身熱作渴脈數有力而能食者為熱身涼不渴脈沉無力而不能食者為寒初起總不宜用澀藥痢疾簡便方干馬齒莧煮爛紅痢以蜂蜜拌白痢以砂糖拌紅白相兼蜂蜜砂糖各半拌食一日二次連湯服之更妙益元散白滑石水飛六兩甘草細末一兩用薑汁打麵粉糊丸梧桐子大每服兩錢白湯下白痢用益元散二錢乾薑末二分煎湯下紅痢每用二錢加紅曲末四分煎湯下紅白相兼則每服三錢加乾薑紅曲各四分煎湯下又方雞子一個煮熟去白用黃擂細以生薑汁小半盅和勻與兒服之不宜吃茶神效久痢不止紅糖白糖飴糖各三錢甘草一錢陳茶葉二錢生薑一片同煎熟用紗蓋住露一宿次早溫熱服神效治瀉痢土木鱉一個母丁香四粒麝香一分為末唾津調為丸如芡實大納臍中膏藥蓋貼即愈治赤白痢相兼淨山楂肉不拘多少炒研為末每服一二錢紅痢蜜拌白痢紅砂糖拌紅白相兼蜜糖砂糖各半拌勻白湯調服空心下更效純白痢屬積寒宜六君子湯見上非搐加乾薑一錢木香五分噤口痢不思飲食以臘豬肉去肉取骨鍋內煎濃湯去油徐徐服之極效又方細辛五錢牙皂一錢蔥白三根酒藥子半個大田螺一個共搗成泥敷臍上候乾即去藥自思食又方活蝦蟆一隻打爛和好麝香六分同研貼臍上用布包緊半日即能飲食一二日痊愈又方於患者床前烹煮鯽魚加作料使聞香味即開便以此少與食之集成至聖丹治冷痢久瀉冷痢有一二年五七年百藥不效者一服此即痊鴉膽子用小鐵錘輕敲其殼殼破肉出其大如米敲碎者棄去專取全仁用之三五歲兒用二十餘粒十餘歲者三十餘粒大人則四十九粒取桂圓肉包之小兒一包三粒大人一包七粒緊包訖空腹溫水吞下以飯食壓之俟大便行時有白凍如魚腦者即冷積也如白凍未見過一二日再進一服永不發矣服藥時忌葷酒三日戒鴨肉一月從此除根倘服後次日肚痛用白芍一根甘草一根各重三錢濕紙包火內煨熟取起捶爛煎服立止愈後宜補脾六君子湯見上非搐加砂仁七分脫肛因久痢所致者水煎蔥頭熏洗令軟送上或以五倍子細末漸漸托入或用五倍子煎湯洗亦可或以鮮蚌肉一隻敷肛門上即能縮入或用團魚頭燒灰存性加冰片二釐共研每用二三分唾津調塗即上又方豬脂二兩煉去渣入蒲黃末一兩調勻塗肛即能縮入外治雖或有效總宜服補中益氣湯三仙丹治痢疾誤投澀藥閉其濕熱以此下之有起死回生之功勿以常方目之若非誤投澀藥閉其濕熱者勿輕用五靈脂一兩南木香五錢巴豆仁四十粒將靈脂木香研為細末聽用以巴豆剝去殼取淨肉四十粒去其肉上嫩皮紙包水濕入慢火中煨極熟取起另一棉紙包之緩緩捶去其油紙濕另換以捶至紙上無油成白粉為度與前二味和勻醋打麵糊為丸綠豆大以硃砂為衣曬乾收貯每服五丸或七丸九丸量兒大小加減合沆瀣丹二丸同研爛茶清調服待下後立愈沆瀣丹治胎毒胎熱面赤目閉口瘡重舌喉蛾便閉溺黃痰食痄腮火丹風搐諸實症川芎酒洗莊黃酒蒸各九錢黃芩黃柏各酒炒九錢黑牽牛炒取頭末滑石赤芍連翹各六錢薄荷枳殼麵炒各四錢半檳榔切童便洗七錢半共焙乾研末蜜丸芡實大茶湯下月內之兒每服一丸稍大者二丸瘧疾簡便方治瘧九條小兒有瘧疾須常燒檀速香以辟邪並常熏其衣褓等物則邪氣易除凡瘧疾口渴不可飲冷水冷茶並生冷之物犯之其病益甚惟以薑湯乘熱飲之最良凡瘧疾熱未全退切不可令其飲食必須熱已退盡方可食之不然終成癖積凡服止截之藥必須餓過發時不發方可吃粥食早瘧必再作下次截藥無靈矣小兒邪瘧其發無時日期不定乍早乍晚或有或無者以麝香五釐同好京墨書去邪辟魔四字於額上效小兒熱瘧不寒用穿山甲一兩大紅棗十個同燒存性為細末每用一錢發日五更白湯下瘧來寒多熱少飲食不思良薑用麻油炒炮姜各五錢共研細末用豬膽汁和丸如梧桐子大臨發之前半時熱酒送下二錢止瘧丹生半夏油炒川貝各二兩共研細末薑汁打糊為丸五更時白湯送下二錢又臨發時淡薑湯送下二錢連服三日效小兒久瘧不止大鱉甲小者不用以醋炙枯研極細末每一錢或錢半隔夜一服清晨一服臨時一服無不斷者消渴三條渴而多飲為上消肺熱天冬麥冬各三錢花粉黃芩知母各錢半黃連黃柏各一錢渴而多飲善飢為中消胃熱生地麥冬各三錢山藥知母丹皮各錢半黃連黃柏各一錢渴而小便白濁不禁下消腎熱六味湯加麥冬五味子蠶繭湯通治三消之症用蠶繭或取絲棉結塊者每以六錢水三碗煎至二碗時時當茶溫飲飲至二七無不愈者三消雖為火盛水衰然虛熱者多實熱者少勿誤作有餘治之余見內科消渴日夜飲水無度豬肚一個洗極淨入淡豆豉五錢在內以綿縫之煮極爛取汁飲之肚亦可食又方煮豬血清湯不入油鹽多飲極效豬血能滋陰降火專走血分脾氣虛者間日飲之恐防作泄故也諸血症簡便方凡吐血鼻血以及上下一切血證用百草霜掃下研為細末大人每服三錢小兒每服一錢糯米煎湯調下三服立愈百草霜鄉間燒茅草鍋底取之燒柴炭者勿用凡吐血用藕節七個水一盅煎至半盅加童便一杯對服又方每日早用自己小便略去頭尾乘溫飲之鼻血不止用大蒜一枚去皮研如泥作餅子如錢大左鼻出血貼左足心右鼻出血貼右足心兩鼻出血貼兩足心立時即止急以溫水洗去免至足心起泡又方亂髮燒灰吹鼻或以線扎中手指根左鼻扎左右鼻扎右兩鼻出血扎兩中指或以梔子燒灰吹鼻內又方以韭菜搗汁一杯童子小便一杯和勻溫暖服之血即止大便瀉血用亂油發雞冠花側柏葉三味俱燒灰等分研極細末每用一錢水酒調下又方用霜後乾絲瓜壹條燒灰存性研末聽用槐花燒灰存性研末聽用每以絲瓜末一錢槐花末五分研勻米飲調空心服數次即止小兒小便血淋用雞屎尖白如粉者炒極焦研末每五分酒調空心服周歲小兒尿血大甘草一兩二錢水六碗煎至二碗服完即愈小兒尿血烏梅燒灰存性研細末每次一錢米飲調下小兒大小便血乃熱傳心肺不宜涼藥以生地黃汁五七匙酒半匙蜜半匙和服腫滿面腫者風足腫者濕凡腫自上而起者皆因於風其治在肺宜發散之香蘇飲合五皮飲自下而起者因於腎虛水泛宜滲利之五苓飲加防己檳榔一身盡腫者或胎稟不足卒冒風寒或因瘧痢脾虛皆能作腫輕者胃苓湯重者加味胃苓丸若小兒元氣本虛大病後渾身浮腫四肢冷口不渴小便清長大便滑瀉不思飲食此陰寒已極脾胃將絕一切治腫之藥俱不可投惟四君子湯加青化桂炮薑白蔻仁以救其脾胃庶可望生水腫簡便方凡小兒患腫切須忌鹽鹽助火邪服之愈熾必待腫消之後將一月以鹽炒過少用之治水腫從腳起入腹則難治用紅飯豆五升煮極熟取湯五升浸兩膝之下冷則重暖若治大腹腫以紅飯豆湯日日服之自消治腳腫掘杉木根切斷而內色紅者為油核方可用以紅根切碎煎濃湯將腫腳先熏後洗即消又方以紅糖一大碗加生薑生蔥三味同煎湯先熏後洗頭面手足俱腫苦葶藶一兩隔紙炒熟研細末以大紅棗蒸過去核取肉和前末捶為丸如豆大每用七粒白湯下日三服五七日則小便多腫自消也忌鹼酸生冷傷寒傷濕腫羌活切片萊菔子等分同炒香揀去萊菔子只以羌活為末每服一錢初日一服次日二服三日三服效腫證氣喘男婦大小腫因積得既取積而腫再作小便不利切不可再用利藥蓋中下二焦氣不升降為陰寒痞隔水遂凝而不通用熟附子三錢生薑二錢沉香三分同濃煎湯治服大人則熟附子一兩生薑六錢沉香七分磨濃汁以姜附對服不拘劑數以愈為度身面浮腫坐臥不得取東向桑枝燒灰淋汁煮紅飯豆數升每飢即食之不得別飲湯水凡水腫本於脾虛不能制水當以參朮補脾為主脾氣實則能健運而水自行切不可下脹滿腹脹氣滿虛脹因吐瀉之後攻下太過宜厚朴白朮陳皮肉桂茯苓寒脹因中氣素寒冷滯鬱結無身熱口渴面唇青手足厥冷氣喘腹脹先以揭元丸消之後以異功散調其脾胃實脹腹中本有食積或飲食過飽固結於中外證則胃口胸前身熱口渴倦臥不語目閉不開若誤認為慢驚而用寧神導痰之藥必死無疑不知大實有贏狀急宜下之用集成沆瀣丹集成三仙丹同服熱脹者或傷寒熱邪入里大便閉結小便短赤渾身壯熱面赤煩躁用集成沆瀣丹又有遍身瘡疥因淋洗塗搽逼毒歸內而腹脹者輕則用荊防敗毒散重則用集成沆瀣丹瘡出脹消者吉瘡不出者凶方俱見痢疾腹脹簡便方治氣脹水脹用羯雞糞乾者二升炒焦黃色出火毒研細末以百沸湯三升淋汁每服一盞調木香檳榔末各五分此中滿盅脹有一無二之方也治食脹氣脹蘿蔔子一兩研細末水調濾汁砂仁一兩以蘿蔔子汁浸一宿炒乾又浸又炒共七次為末每一錢米飯調服黃疸面目指甲俱黃色其症有二一曰陽黃必身熱煩躁或躁擾不寧或消穀善飢或小便熱痛或大便閉結脈實而有力此證不拘外感風濕內傷飲食皆能致之但察兒之元氣尚強脾胃無損者宜清火邪利小便茵陳五苓飲最穩或胃苓湯加茵陳若大便閉結熱盛者宜沆瀣丹見上痢疾一曰陰黃由氣血敗損所致喜靜惡動喜暗畏明神思困倦言語輕微畏寒少食四肢無力或大便不利小水如膏此乃陽虛之候宜四君子湯為主或加炮姜一錢或加扁豆當歸各一錢黃疸簡便方罨臍取黃法見內科黃疸小兒急黃以絲瓜連皮帶子火燒存性研末每服一錢米湯調下連服數次愈小兒黃如金色因積滯凝於脾家以稻草煎濃湯飲之數次效又方取山間薏苡仁根洗極淨煎湯服之自愈治濕熱發黃生薑半斤茵陳半斤同搗爛以布包好時時周身擦之其黃自退腹痛上焦痛者在膈上是胃脘痛也中焦痛在中脘脾胃間病下焦痛在臍下肝腎間病也凡可按者為虛拒按者為實久病多虛暴病多實得食稍減者為虛脹滿畏食者為實痛徐而緩莫得其處為虛痛劇而堅一定不移為實夾冷痛面色或青或白冷甚者面色暗淡唇口爪甲皆青喜熱熨此脾氣虛寒之極輕者用當歸青化桂人參土炒白朮各一錢木香炙草各五分大棗六枚生薑三片水煎溫服寒甚者用六君子湯加青化桂一錢砂仁白蔻仁良薑各六分若生冷果菜停積中焦腹痛泄瀉嘔惡者再加煨神麯錢半公丁香木香屑各五分泄瀉不止者再加肉豆蔻去油八分夾熱腹痛面赤壯熱四肢煩手足心熱用四順清涼飲白芍二錢當歸錦莊黃各一錢炙甘草五分水煎熱服若大便調者只用白芍一根重三錢甘草一根重二錢用紙七重包之小濕慢火煨熟取起捶爛煎湯服若寒加肉桂五分尤妙後方名芍藥甘草湯一切腹痛者皆治惟寒者宜略加肉桂食積痛口中氣溫面黃或白目無精光或白睛多喜眠惡食大便酸臭輕者用山楂肉二錢廣皮半夏姜炒茯苓各一錢神麯煨蘿蔔子各錢半加厚朴姜炒檳榔炒各七分水煎服數劑重則用三仙丸見痢疾腹痛簡便方治一切胃痛胸痛腹痛腰痛疼如錐刺不可忍者花椒不拘多少研末和少麵粉醋和成餅貼於痛處上鋪艾絨用火灸之痛立止又治一切腹痛方用小麥稈燒灰置地出火毒將篩盛之滾水淋汁服一切疼痛或寒或熱或積食或積血證莫能辨藥不能施有起死回生之妙用生薑一斤搗爛略擠其汁入鍋內炒熱用布分作二包先以一包熨痛處冷即換熱勿令間斷如姜已干略加前汁拌之又炒又熨痛止乃已凡小兒腹痛摸其肚有一塊梗起者蟲痛也不須服藥惟令大人以手擦揉其塊處久久揉之半日許其蟲將死者從大便而出痛立止小兒腹痛啼哭不止用南木香明乳香黑沒藥俱去油各五分水煎溫服又方用乳香一錢去油燈花七粒同為末每二分乳汁調服小兒胎寒腹痛啼哭吐乳大便青色身出冷汗用薑黃一錢南木香乳香沒藥俱去油各三錢其為細末蜜丸芡實大每服一丸薑湯調下又理中湯亦佳見上非搐小兒盤腸氣痛月內之兒多有之其證腹內如蛙聲啼哭不止者是也蓋寒熱不和臟氣不行用梔仁五錢附子三錢同炒極枯取起揀去附子不用單取梔仁加入白芷一錢為末每五分小茴湯下又方濃煎蔥湯澆洗兒腹仍搗蔥炒熱作餅貼臍上良久屎出即愈小兒蟲痛口流涎沫使君子取肉微炒為末五更時米飲調下小兒腹痛一痛即死者名為蟲痛用乾薑燒灰白蕪荑二味等分為末母五分米飲調下證重者每服用一錢下蟲方見下頁小兒癖積簡便方治癖積心腹內結如拳及臍腹痛不可忍用莊黃一兩酒蒸炮姜五錢附子五錢九肋鱉甲八錢用好醋將鱉甲煮一時久取起酥炙黃色為度共為細末用三年老米醋一升熬至半升和前末為丸綠豆大每服十丸空心米湯下取下積如魚腦敗血爛肉青泥即愈後用補脾調理按此方藥廉功大比消癖丸力勝十倍允稱神妙小兒痞塊肚大肌瘦面黃白芙蓉陰乾研末入雞肝內扎合飯上蒸熟食之七八次愈小兒好食茶葉成癖用鮮榧子一斤空心晌午黃昏每服十四粒吃完即愈榧子京果鋪有賣小兒好食泥土及肚脹用好黃土濃煎黃連取清汁和餅食效又日與芝麻三錢加雄黃末二分食之白湯送下小兒食積結痞塊用大紅棗一斤皮硝一兩同煮以水乾為度曬乾每日食此棗徐徐服之自消小兒積久而成鱉腹內有形擺頭掉尾大者如杯小者如錢上侵人喉下蝕人肛或附脅脊或隱腸腹用生硫黃研極細末每日老酒調服一錢空心下久服自化硫黃鬚色如初出鴨雛者方可用帶青帶赤帶黑色者皆不堪用此物最平穩多服無疑下蟲簡便方凡小兒肥甘過度或糖食甜物太多乃致濕熱久停而成積積久生蟲時發腹痛以手摸之腹內有塊或一條梗起外症唇紅面白六脈浮洪其痛時作時止痛止即能飲食者蟲痛無疑又有腹痛一痛即死者亦是蟲痛欲去此蟲用苦楝根皮誠天下打蟲第一神方其法於月初旬蟲頭向上之時行之先夜掘苦楝根須取每年結子者方是母樹其根浮於土面者有毒不可用專取土中者洗淨泥土以刀刮去紅皮只取白皮四五錢兒大者六七錢切碎聽用次早以油煎雞蛋令兒嗅之以引其蟲頭向上而求食另於別室以水一盅濃煎苦楝皮湯一小杯不可使兒聞其藥氣一聞其氣蟲即潛伏矣俟藥熟以雞蛋與兒食即服藥半日不可飲食俟蟲下後方飲食之服藥後兒似困頓萬萬放心蟲下後精神如舊仍當急為健脾庶蟲不復生永無患矣蟲症輕者以使君子肉二錢糖水炒於初旬飢時服之三次亦可打下蟲又方使君子炒榧子去殼各十枚檳榔甘草各一錢為末和飯搗為丸如梧子大於上旬日每早空心服十丸五日蟲盡下凡去蟲後總宜服六君子湯加川椒八分烏梅一個數劑蟲不更生汗證簡便方凡男婦小兒及產母一切虛證偶然大汗諸藥莫能止者蓋由玄府大開一時難閉所以服藥不能止先將五倍子末醋調作小餅子貼臍上以布扎之然後以舊蒲扇燒灰多加糯米粉和勻以夏布袋裝之自頭至足遍身輕撲之使其粉入毛竅玄府自閉虛汗即止神治也疝氣簡便方治小兒疝氣腫痛用荔枝核炒焦五錢大茴香酒炒二錢五分共研細末每服一錢溫酒調下又方不論小兒及男婦一切疝氣以及諸般氣痛用荔枝核四十九個炒焦留白陳皮九錢生硫黃四錢共為末鹽水打麵糊為丸綠豆大遇痛時空心服研送九丸良久再進一服不過三服全效小兒腎腫硬痛橄欖核荔枝核山楂核三件等分俱燒過存性研末每服一錢空心小茴香湯送下小兒疝氣痛全蠍不拘多少炒焦為末每三分小茴香煎湯送下小兒冷疝作痛陰囊浮腫川楝子去核五錢吳茱萸二錢五分炒研為末酒打麵糊為丸小豆大每服十丸鹽湯化下小兒疝久陰囊堅硬如石名為木腎用栝蔞連皮帶子二錢蓽茇二錢生薑二錢蔥白二錢酒煮熱服被覆暖臥取汗效小兒濕地上坐或有蚯蚓吹其卵腫大而垂者以鹽湯浸洗之或以蒼朮煎湯加鹽少許洗之效或用鴨一隻以箸橫擱鴨口令含其卵吹氣滴涎即效陰莖腫痛燈草煎湯時時服之腫消痛止小兒陰囊生瘡濕爛者謂之脫囊用紫蘇研極細末敷之以荷葉包住或用主荷葉以火烘軟包之雖卵丸露出亦可治也陰囊腫痛用蟬蛻一兩煎湯洗以紫蘇葉搗如泥包之即愈余詳外科小兒外腎臊臭時復濕癢用柴胡澤瀉車前木通生地各一錢歸尾六分龍膽草五分水煎服以飲食壓之外用荷葉一片胡椒十粒打爛煎水洗之自效小兒龜胸龜背取龜尿摩其胸背久即瘥法取龜置瓦盆中以鏡照之即失尿急以物收之或以豬鬃刺其鼻即尿龜胸者肺熱作脹胸骨高起有用桑皮錢半地骨皮一錢合白虎湯生石膏四錢知母錢半糯米一撮甘草五分服數劑間用六味丸加龜鹿二仙膏而見效者氣喘則難治龜背不可治因稟賦不足惟常服六味地黃湯加桂附及十全大補湯加鹿茸龜版為丸俟長養氣血再用外治之法庶可十全二三耳六味地黃湯熟地四錢山藥茯苓各二錢山茱丹皮澤瀉再加肉桂附片各一錢名八味地黃湯十全大補湯人參白朮土炒熟地當歸各二錢茯苓酒芍川芎炙草各一錢炙黃耆三錢肉桂去粗八分加重等分可用煉蜜為丸二便不通簡便方症治並詳內科罨臍法治中下二焦熱大小便秘連須蔥七根不洗生薑一大塊淡豆豉三錢同搗爛作一餅入銚子烘熱掩肚臍以帛扎定良久氣通二便自利蜜導法治二便不通用冬蜜八兩煉至滴水成珠不散入皂角細末二錢和勻稍冷捻如小指大一條外以蔥涎塗上輕輕插入穀道中氣通則大便行而小便亦利矣又方豬膽一個以小竹筒套住蘸蔥涎插入穀道七八分用手擠膽汁入內移時即通大小便不通經二三日危急者以皂角燒灰研末米湯調下二錢立通又方以小竹筒抹以蔥涎插入穀道以芒硝五錢研細香油半盞皂角末少許令人口含灌入穀道中少時即通小便簡便方三條凡小便不通服藥無效用商陸五錢研末入麝香少許先以舊夏布蓋於臍上將藥放布上藥氣入腹即通小便數日不通遍身手足腫滿諸藥不應者用蘇葉一斤煎濃湯入腳盆內令患者坐盆上熏之冷則又添熱湯外用炒鹽熨臍上及遍身腫處良久便通腫消而愈又方用連須蔥白一斤搗爛炒熱分作二處各以布包輪轉熱熨臍下即通又方用食鹽半兩調溫水服之良久以指入喉中探吐一吐即通蓋上竅不通下竅閉也又方以皂角末少許吹入鼻內得嚏即通小兒小便白濁色生懷山藥為末和粥食數次即愈澄之旋變白色者脾虛有食積用異功散見非搐加神麯山楂肉頭縫不合三條封囟法頭縫不合名曰解顱天南星不拘多少以薑汁炒熱研細末醋調塗於絹帛上烘熱貼囟門惟以合為度小兒囟陷如坑由久病真元不足氣血兩虛大凶之候速宜十全大補湯加鹿茸薑棗煎服外用狗頭骨炙黃為末雞蛋清調敷效小兒解顱或因病後忽然囟門寬大頭縱四破此腦髓不充大虛之候用鹿茸防風白芨柏子仁四味各五錢其為末乳汁調作餅貼囟門上一日一換以合為度小兒語遲六味丸加五味子鹿茸間服炙耆黨參各錢半炙草白朮各一錢陳皮歸身各五分升麻柴胡各三分小兒行遲四五歲不能行用六味地黃丸加鹿茸牛膝五味子五加皮久服自效又方五加皮五錢牛膝酒炒木瓜各二錢五分共研末每用一錢米飲調下效小兒鶴膝宜六味地黃丸加當歸牛膝久服仍以天南星為末醋調烘熱貼之良又萬全膏大附子膏均可貼見外科眼目簡便方治目生胬肉赤脈貫瞳白膜遮睛諸般雲翳用白丁香即麻雀屎也倒者為雌雀屎不用取豎立者雄雀屎也不拘多少研末水飛過如飛硃砂樣渣滓不用俟藥澄底傾去清水曬乾每以些微同乳汁研化點翳上其翳自去取麻雀屎寺院中及城樓上多有之赤眼腫痛用朴硝一撮以碗盛新豆腐一厚塊挖一大孔勿穿將朴硝放豆腐孔內飯上蒸之俟硝已化去豆腐不用取汁洗眼數次自愈宜先服敗毒散見誤搐加赤芍木賊各一錢蟬蛻七個再用洗藥勿遽點藥下同火眼及風熱眼生南星五錢紅豆飯五錢共為末取生薑自然汁調作一餅貼兩太陽穴效火眼痛極用大紅棗取肉五六枚蔥三四根共捶如泥作二小餅閉目貼之令其發散以小兒自己熱尿洗數次效小兒眼生白點取桑汁以燈芯點之即愈治爛弦風最效方用鮮色銅綠三錢研細末以生蜂蜜濃調塗粗碗內要調略干稀則少時流出矣用艾燒煙將碗覆艾上煙燻之須熏至銅綠焦黑為度取起冷定以乳汁調勻飯上蒸過每用少許搽眼爛弦處神效治眼毛倒睫不起用五倍子為細末蜜調敷眼皮上其睫自起又方以無名異為末紙卷作捻點火吹滅閉目熏之睫自起赤眼腫痛不消以精豬肉切一片如指甲大以水洗淨其血貼於眼皮上良久易一片即愈小兒眉叢生瘡用穿山甲前膊二甲炙焦為末入輕粉少許清油調敷即愈又方蒜瓣燒灰清油調搽亦妙耳病簡便方治小兒聤耳流膿出汁海螵蛸白明礬真鉛丹炒以上各三錢胭脂燒灰一錢麝香五釐其為末以棉搌干耳內濃汁水用小竹筒吹藥數分入耳效治小兒耳忽暴聾雄磁石煅一錢真麝香五釐共為細末以棗研爛和為一丸如棗核大綿裹塞耳中即以生鐵一小塊熱酒泡過含口內須臾氣即通矣治小兒無故耳聾取龜尿滴入耳中效或以生麻油日滴三五次數日即愈耳內腫痛流膿出水用虎耳草又名倒垂蓮搗取汁多灌入耳中常常用之此治耳聾之妙藥略加枯礬更妙又方用蛇蛻燒黑存性研末吹入耳中即愈又方用千層石榴花焙乾為末以小竹筒吹入耳內效耳前後生瘡黃柏枯礬滑石龍骨海螵蛸各等分共為細末如濕用干搽如干用清油調敷神效耳外生瘡用黃丹一錢松香八分輕粉一分共為細末香油調搽小兒耳後生瘡為腎疳以地骨皮研末篩出極嫩者香油調搽其粗末煎水洗之諸蟲入耳取貓尿滴入耳中其蟲自出若用麻油滴之則蟲死難出取貓尿法以生薑擦其鼻則尿自出諸惡蟲入耳用稻草燒灰淋汁滴入耳中其蟲即出而死也鼻病簡便方治乳子鼻塞不能吮乳香附米正川芎荊芥穗直殭蠶北細辛豬牙皂各五錢共為細末以蔥白搗成膏每用藥末五錢與蔥膏和勻攤軟帛上臨臥烘熱貼兒滷門上早晨取去治小兒鼻中出血黑梔仁亂油發燒灰存性等分共為細末以些微吹鼻中又法用涼水浸紙搭鼻並以涼水浸手巾搭頸後仰臥得效又以紙卷蘸香墨塞鼻中須臾即止血甚效鼻疽破爛用杏仁去皮尖搗碎以紙包壓去油以成白粉為度每杏仁末一分對真輕粉一分和勻吹患處鼻流清涕不止名曰鼻淵乃風熱在腦故也用蒼耳子炒辛夷杏仁白芷薄荷等分為末每用一錢臨臥蔥湯調服但不以劑數擬以愈為度鼻流臭黃水名控腦沙用紫貝子俗名南蛇牙齒粵人呼為狗皮螺取二三枚火煅醋淬為末紙包放地上去火毒每服一錢大人二錢以絲瓜藤煎湯調藥空心服以愈為度鼻被擦爛或擦落急以貓兒頭上毛剪碎以唾津調敷之自愈疽瘡蝕鼻破爛不堪用五倍子燒灰存性研末以臘豬油塗之口舌牙疳咽喉簡便方口舌牙疳並見上口舌牙疳喉痛並用方甘草桔梗各三錢連翹山梔荊芥穗花粉各一錢薄荷三分煎湯徐含服治小兒鵝口瘡箭頭砂枯白礬明牙硝各五錢共為細末每用三五分吹之口疳甘蔗皮燒灰研末吹之效口瘡破爛並治咽喉喉癬喉癰用鳳凰衣即伏雞子殼內皮也微火焙黃橄欖燒存性兒茶三味俱等分共為末以一錢為則加冰片五釐口疳搽患處喉病吹入之便能飲食口瘡久不愈虛火也用生附子一個切焙為末醋和作餅男左女右貼腳心引火下行自愈口瘡不能飲乳藥密陀僧研末醋調塗足心愈即急洗去又方桑樹皮中白汁搽患處又方人中白煅研吹之俱效小兒口角生瘡名燕口瘡以亂髮燒灰存性米飲調服外即以此渣敷之又方蒸飯時收甑蓋上流下氣水搽之即愈口唇腫黑癢痛不可忍先以瓷鋒砭去惡血以古銅錢磨豬油塗之效治走馬牙疳及各樣口疳多年田野中白螺螄殼研爛少加兒茶共為細末吹患處即效走馬牙疳急用大針縛箸上露鋒一分半將牙齦白點挑破出血要擠出白點如半粒米者擠盡用青絹絞淨以薄荷湯磨好京墨遍塗滿口勿即令乳睡片時即效較諸藥更捷小兒螳螂子方按小兒口內生黃馬牙口噤煩睡諸書並無割之一法今吳俗盛行此風忍以赤子之頤就好婦之刃每至割斃不知歸怨茲特錄簡易良方以告同志麝香一分硃砂五分螺螄七個同搗如泥塗囟門上陰乾自落切勿剝去若症重者將針微刺患處出血即用京墨磨搽立愈治牙齦潰爛諸藥不效者用鹽欖二三個連皮帶核火中煅過存性研末加冰片七分香油調搽神效走馬牙疳臭爛出血紅棗三枚去核以明雄黃研末填滿棗內新瓦盛之火煅存性研末搽之又方鳳凰衣即伏雛蛋殼內皮未見水者焙乾少加枯礬共為細末搽之效又方青黛水飛黃柏枯白礬五倍子各一錢共研細末先以米泔漱口搽之自愈治口疳瘡及咽喉疼痛用吳茱萸二兩研末少加麵粉醋調作二餅貼兩足心以布扎之過夜即愈內服加味甘桔湯見上外用百草霜蒲黃薄荷青黛水飛少加冰片吹之尤效治重舌木舌腫滿強痛或痛不止不能言語用粗針以線扎箸頭上刺患處甚者數十次為妙只刺舌尖及舌兩旁其舌中心及舌下切不可針犯之令出血不止其刺出之血以紅色者毒輕紫色者為重黑色者最危仍以蒲黃研末搽舌上即消又方刺出血後以生蒲黃海螵蛸共為末搽之即消舌忽脹大腫硬即時氣絕名為翣舌用皂礬不拘多少新瓦上以火煅變色為度放地上候冷研末搽舌上立消治重舌木舌皆效舌腫滿不能出聲以梅花冰片研爛敷之或以食鹽百草霜共為末並水調敷立效亦宜刺出血以蒲黃海螵蛸搽尤效絆舌者舌根下有筋一條絆其舌尖令舌短縮不能吮乳宜精細看明見舌根下有筋如線牽絆其舌者用針輕輕挑破之挑時但挑此筋切不可誤傷舌根慎之舌斷能重生用活蟹一隻炙乾為末敷之此方至神至驗治小兒胸膈積熱致生風痰而患喉痹用粉甘草四錢牙桔梗四錢以淨水煎細細嚥之加牛蒡子荊芥穗川貝母天花粉各一錢尤效外方用燕子窩泥雄黃各等分堆花燒酒調敷咽喉外兩旁即愈咽喉內生瘡鼻孔內亦爛若作喉風治立死用白霜梅一個燒存性枯礬一錢山甲炙枯一錢共為細末吹喉中神效小兒鎖喉方用芙蓉葉搗汁煎雞蛋兩個一貼囟門一貼肚臍即愈又方黑鯇魚膽一個入糯米在內吊檐前陰乾遇此病取米七八粒研末以小竹管吹入舌上喉瘡已破瘡口疼痛難進乳食用豬腦髓蒸熟姜醋調和服之自愈咽喉中結核不通飲食危困欲死用茅柴灶內百草霜以蜜和為丸如芡實大每用一丸白湯化開灌之甚者不過二次效誤吞針用磁石研末以黃蠟溶化和丸如豆大吞下針共丸藥同從大便出又方蠶豆煮熟食之又韭菜略煮食之誤吞銀錢金銀釵環之類只以米糖水灌之久之自出誤吞銅錢生慈菇搗汁多飲自然愈凡諸骨哽喉谷樹葉搗爛取汁服其骨自下誤吞鐵物以木炭一兩研細分兩次煮粥食之效丹毒十四條總治十種丹毒北防風黑梔仁麥冬荊芥穗粉乾葛薄荷木通苦參牛蒡子以上各一錢升麻七分甘草五分燈芯十根水煎熱服便秘加大黃一錢利之並用外導法亦可瓷針砭法用上清瓷器輕輕敲破取其鋒銳者一枚將箸頭劈開橫夾磁針露鋒於外將線紮緊以瓷鋒正對丹毒之處另用箸一條於瓷鋒箸上輕輕敲之其血自出多刺更妙毒血出盡立時見功治丹若不砭去惡血專用搽敷十不救一飛灶丹從頭頂起腫然後散開先用蔥白搗取自然汁塗之效走灶丹從頭頂起紅腫痛苦異常用紅飯豆研末雞蛋清調塗鬼火丹從面部起紅腫用灶心土研為細末雞蛋清調塗天火丹從背上起赤點用桑白皮切碎焙乾為細末羊油調塗天灶丹從兩臂赤腫黃色起用柳木燒炭研末淨水調塗水丹先從兩肋起赤腫用多年鏽鐵磨濃汁豬油調塗葫蘆丹先從臍下起用尖檳榔切碎焙乾研末米醋調塗野火丹先從兩腳起紅腫用乳香去油研末以羊油調塗煙火丹從腳背上起紅腫用豬槽下土研末麻油調塗胡漏丹從陰囊下起紅脈用門檻下千腳土研末羊油調塗更有胎毒重者遍體皆是速用芸臺子即油菜子也秤過一兩酒渣一大壺和餅濾去渣取酒復煎數沸不拘時溫服一盞又方取芸臺菜葉搗爛敷之隨手即消如無生菜乾者為末水調敷凡丹毒遍身或連腰周匝百方不效者惟此最神小兒赤丹用精豬肉切薄片貼之重者貼二次即愈小兒癬疥方用藁本一二兩煎湯洗浴並浣衣尤妙破傷風小兒或因跌撲或刀斧破傷風邪暗襲傷處發腫謂之破傷風速宜治之不然則發痙矣內服疏風活血散外以紫金錠一塊磨水塗之疏風活血散治小兒出血破傷風已痙未痙者全當歸懷生地赤芍藥北防風以上各一錢二分鮮紅花正川芎廣蘇木炙甘草以上各六分生薑三片大棗一枚水煎熱服紫金錠山慈菇三兩五倍子三兩紅芽大戟去蘆一兩五錢明雄黃鏡辰砂各五錢真麝香三錢共為細末糕米飲和藥搗干錘為錠磨水塗之瘰癧四條忌刀針宜用消瘰丸並貼萬全膏俱見內科並外科馬刀生耳之前後有瘡作核如杏核大小不一名馬刀瘡為瘰癧之根用桃白皮切三指大一塊刮去外皮留內一層貼瘡上以艾炷於桃皮上炙之覺極痛即止毋令傷皮明日又炙不數次而核消矣治小兒瘰癧未潰者令內消已破者能收口服此一月痊愈用直殭蠶半斤先用清水洗三次去石灰淨曬乾炒枯另將晚禾米半斤炒極熱共研細末米糊為丸重一錢一個每日空心服以夏枯草煎湯下兒大者二丸小者一丸研爛調服常須以甘肥葷潤之物滋澤之紫霞膏治瘰癧未成者貼之自消已成者貼之自爛已潰核存者貼之自失並治諸色頑瘡破爛不愈疼痛不已者俱效明淨松香一斤研末鮮色銅綠二兩研末以真麻油四兩先煎數沸下松香熬化次下銅綠煎至白煙將盡膏已成退火傾入瓷罐收貯用時將熱湯熔開旋攤旋貼之專治瘰癧破爛多年不愈連及胸腋用新出窯礦石灰一塊滴水化開成粉用生桐油調勻乾溼得中先以花椒蔥煎湯洗淨其瘡以此塗之不數日痊愈真奇方也小兒痄腮腫痛用橄欖核醋磨濃汁以鴨毛蘸塗數次即效小兒毒氣攻腮赤腫可畏皂角二兩生南星二錢糯米一合共為末薑汁調塗立效余詳外科蟮虫匝病頭蟮虫匝頭一名蟮黃頭在小兒頂心腫起先白後紅如不治愈黃愈多旁添小者如百鳥朝王照其腫之大小用枳殼半個去瓤以生灰面調為糊塗在枳殼沿上如道冠一樣戴在毒上其毒水自能吊出俟其脫下其腫處小再用小枳殼半個如前法糊面戴之水亦干矣俟其自脫不過六七日腫平而發茸茸矣又方活蝦蟆一個剝一整皮貼瘡上奇效又方大蛙肉搗爛加冰片少許攤患處立效楊梅瘡二條胡麻丸小兒梅瘡最為惡候倘發於一二月間或半周之內最為難處以其毒稟先天方藥一時難及也宜先用胡麻丸苦參五錢首烏蒸胡麻炒蔓荊子炒威靈仙炒荊芥焙皂角刺炒各三錢石菖蒲白菊花各二錢共為細末酒打米糊為丸每三錢量兒大小竹葉煎湯下服至三七之後方用點藥不三日而瘡盡愈惟點藥不可太早恐內毒未盡也梅瘡點藥必須服胡麻丸二十一日之後方可用之北杏仁一兩半熱湯泡去皮以綿紙包之木錘緩緩捶去油必數十換紙方得油淨以成白粉為度謂之杏霜每杏霜一錢加入真輕粉八分雄黃一分先以槐花煎濃湯將瘡洗淨瘡濕則以藥干搽之瘡干則以豬膽汁調搽三日痊愈瘡疥雜方凡半周一歲乳子偶患瘡瘍必須先服解毒之藥一二劑然後稍用外治無不愈者倘不先解毒而遽爾妄用搽敷必致逼毒入內反為大害以致難治慎之解毒湯羌活防風赤芍當歸生地黨參木通荊芥穗連翹黃芩玄參各一錢升麻甘草各五分燈草十根水煎服大便閉結加熟大黃一錢方效治疥瘡效方大楓子肉三錢輕粉明礬各五分共為末聽用先以臘豬肉二兩麻黃五錢入鍋內同熬以麻黃黑色為度濾去渣冷定調前末藥搽之甚易取效熱毒瘡疥用生石膏生硫黃陳細茶各二錢共為末以生豬油和藥搗勻搽之一二三歲遍身生瘡真麻油浸紫菜錢半搽之須搽好一處再搽一次勿使通身搽遍治癩痢白禿頭瘡方雞蛋十個去殼攪勻入小鍋香油蕩成一餅乘熱蓋頭上一時許蛋冷取下又將上面用油煎熱再覆頭上數次痊愈妙不可言小兒白禿癩用石灰窯內燒紅流結土渣二兩百草霜雄黃各五錢明礬三錢榆皮錢半輕粉六分共為末於剃頭後用豬膽汁調塗神效又方鴿糞新瓦焙存性研末麻油調搽如瘡痂堆起用米泔水同川椒蔥煎湯洗去再搽黃水頭瘡即肥瘡也其瘡黃水流下即沿生漸至眉耳不治則殺人黃連五錢輕粉三錢共研細末麻油調成膏塗粗碗內乾溼得中將碗覆轉下燒艾葉熏之緩緩燒煙熏至黑色為度放地上出火毒次加冰片三分研勻香油調搽數次即愈又方水邊烏桕樹根曬研末四五錢雄黃一錢生油調搽又方雞蛋三個煮熟去白用黃炒枯出油搽上三五次即愈一切無名腫毒諸般火丹熱瘭濕瘡取陰地蚯蚓糞四兩皮硝二兩共研末新汲水濃調稠厚敷患處干則易之小兒兩大腿近小腹處生瘡若皮脫開漸延小腹則不救此名胎剝用豬膽抹黃柏上炙研塗之或加伏龍肝末等分唾濕搽患處內服胡麻丸方見上梅瘡小兒羊鬚瘡小紅棗燒灰存性香油調塗即愈又飯甑上氣水塗之效小兒熱瘡雞蛋五枚煮熟去白用黃再用亂髮一團如雞子大同入鍋內熬之初甚干次則發焦乃有液出久熬則液漸多而黃發同化而成液以黃髮盡為度取起冷定塗瘡上即以苦參末摻之神效小兒頭上軟癤此癤愈而復發至難除根用枳殼一個剖開磨令口平用麵糊四圍貼癤上於一邊安一燈草以通膿水愈後枳殼自脫並無痕跡又方或用大芋頭搗爛敷之亦妙湯火簡便方五條凡湯火傷不可用冷物拓冷水洗並涼藥敷貼以致火毒內攻不可救治余詳急救篇凡湯火傷初起即以食鹽研末用酒醋調勻敷患處頻塗不絕暫時雖痛卻能護肉不壞然後用藥調治凡湯火傷悶亂不省人事急以蜂蜜調湯灌之若重者急以煮過好酒數十壺入浴盆內以患兒浸酒中雖至重者不死若燒系手足即以酸醋一二升浸之出醋尚痛少時痛止不瘡不膿無疤痕凡湯火傷爛皮已脫去惟有鮮肉或臭爛不堪諸藥不效用豬毛一籃以破鍋炭火煅紅入豬毛在內煅之少時豬毛消化而成黑液取起冷定略加大黃數錢再加冰片一分半研勻以香油或茶油或蠟燭油俱可調搽此方取效如神火藥燒壞先以好酒洗淨次用煮熟雞蛋黃數個熬出油聽用以大黃研末雞蛋油調搽即愈斷乳畫眉膏山梔炒黑三個雄黃硃砂輕粉各一分共為末清油調勻候兒睡著濃畫兒二眉上睡醒自不吃乳未效再畫仍以墨搽乳頭遍身奇癢叫啼不休生薑搗爛稀布包搽自止撲疿子綠豆粉滑石各三錢輕粉三分共研末舊綿蘸撲效男女童勞二方野茄棵內蟲取數十條和入食物內食之勿使病者知數次病愈極效茄根上有注孔內即有蟲蟲身帶綠色嘴黑者是也又方露天糞坑內蛆取入稀布袋內於流水處漂漾極淨瓦上焙黃色每一兩入糯米粳米各二兩炒熟共磨細以沙糖米湯調服自愈
